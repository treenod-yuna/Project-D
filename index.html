<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>매치3 기믹 프로토타이핑 플랫폼</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 전체 앱 컨테이너 -->
    <div id="app">
        <!-- 보드 영역 (중앙) -->
        <div id="board-area">
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- 우측 패널 (추후 확장: 파라미터 제어, 기믹 입력) -->
        <div id="side-panel">
            <div class="panel-section">
                <h3>보드 정보</h3>
                <div id="panel-board-info">
                    <p>초기화 중...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 하단 정보 표시 -->
    <div id="board-info">
        v7 | 클릭→키패드 1~5: 특수블록 배치 | 더블클릭: 특수블록 발동 | 리소스 이미지 적용
    </div>

    <!-- 메인 스크립트 (ES Module) — 캐시 방지용 버전 파라미터 -->
    <script type="module" src="js/main.js?v=7"></script>
</body>
</html>
